<div class="container-fluid py-4">

  <!-- Header -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center">

        <h4 class="mb-0">
          <i class="fas fa-bell me-2 text-primary"></i>
          School Notices
        </h4>

        <button class="btn btn-primary" (click)="resetState()">
          <i class="fas fa-plus me-1"></i>
          Add New Notice
        </button>

      </div>
    </div>
  </div>

  <!-- ================= NOTICE FORM ================= -->
  <div class="card mb-4">

    <div class="card-body">

      <h5 class="mb-3">
        {{ isEditMode ? 'Edit Notice' : 'Create Notice' }}
      </h5>

     <form [formGroup]="form">

  <div class="row">

    <!-- TITLE -->
    <div class="col-md-6 mb-3">
      <label>Title</label>
      <input type="text" class="form-control" formControlName="title">
    </div>

    <!-- DESCRIPTION -->
    <div class="col-md-6 mb-3">
      <label>Description</label>
      <input type="text" class="form-control" formControlName="description">
    </div>

    <!-- NOTICE FOR (IMPORTANT FIX) -->
    <div class="col-md-6 mb-3">
      <label>Notice For *</label>
      <select class="form-control" formControlName="noticeFor">
        <option value="">Select</option>
        <option value="STUDENT">STUDENT</option>
        <option value="TEACHER">TEACHER</option>
        <option value="PARENT">PARENT</option>
        <option value="ALL">ALL</option>
      </select>
    </div>

    <!-- CLASS ID (IMPORTANT - backend required) -->
    <div class="col-md-6 mb-3">
      <label>Class ID *</label>
      <input type="number" class="form-control" formControlName="classId">
    </div>

    <!-- SECTION ID (IMPORTANT - backend required) -->
    <div class="col-md-6 mb-3">
      <label>Section ID *</label>
      <input type="number" class="form-control" formControlName="sectionId">
    </div>

    <!-- START DATE -->
    <div class="col-md-6 mb-3">
      <label>Start Date</label>
      <input type="date" class="form-control" formControlName="startDate">
    </div>

    <!-- END DATE -->
    <div class="col-md-6 mb-3">
      <label>End Date</label>
      <input type="date" class="form-control" formControlName="endDate">
    </div>

  </div>

  <!-- BUTTON -->
  <div class="text-end mt-3">
    <button type="button"
            class="btn btn-success me-2"
            (click)="isEditMode ? updateNotice() : createNotice()">
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>

    <button type="button" class="btn btn-secondary" (click)="resetState()">
      Cancel
    </button>
  </div>

</form>
    </div>
  </div>

  <!-- ================= LIST ================= -->
  <div class="card shadow-sm">

    <div class="card-body p-0">

      <div *ngIf="notices.length === 0" class="text-center py-5">
        <i class="fas fa-bell-slash fa-3x text-muted mb-3"></i>
        <h5 class="text-muted">No notices found</h5>
      </div>

      <div *ngIf="notices.length > 0" class="table-responsive">

        <table class="table table-hover mb-0">

          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Description</th>
              <th>Start</th>
              <th>End</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let notice of notices; let i = index; trackBy: trackByFn">

              <td>{{ i + 1 }}</td>
              <td><strong>{{ notice.title }}</strong></td>
              <td>{{ notice.description }}</td>
              <td>{{ notice.startDate | date:'mediumDate' }}</td>
              <td>{{ notice.endDate | date:'mediumDate' }}</td>

              <td>
                <span *ngIf="notice.isActive" class="badge bg-success">Active</span>
                <span *ngIf="!notice.isActive" class="badge bg-warning text-dark">Inactive</span>
              </td>

              <td>

                <button class="btn btn-sm btn-primary"
                        (click)="editNotice(notice)">
                  Edit
                </button>

                <button class="btn btn-sm btn-danger"
                        (click)="deactivate(notice.id)">
                  Deactivate
                </button>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>
  </div>

</div>
