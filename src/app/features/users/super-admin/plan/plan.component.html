<div class="container-fluid py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">
      <i class="fas fa-layer-group me-2"></i>
      Manage Plans
    </h2>

    <button class="btn btn-success" (click)="resetForm()">
      <i class="fas fa-plus me-2"></i>New Plan
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3 text-muted">Loading plans...</p>
  </div>

  <div *ngIf="!loading" class="row">

    <!-- FORM -->
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">

        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            {{ isEditMode ? 'Edit Plan' : 'Create New Plan' }}
          </h5>
        </div>

        <div class="card-body">

          <!-- ✅ REACTIVE FORM -->
          <form [formGroup]="planForm">

            <!-- Plan Name -->
            <div class="mb-3">
              <label class="form-label">Plan Name *</label>
              <input type="text"
                     class="form-control"
                     formControlName="planName"
                     placeholder="Enter plan name">
            </div>

            <!-- Price + Student Limit -->
            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Price *</label>
                <input type="number"
                       class="form-control"
                       formControlName="price"
                       placeholder="0">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Student Limit *</label>
                <input type="number"
                       class="form-control"
                       formControlName="studentLimit"
                       placeholder="0">
              </div>

            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control"
                        rows="4"
                        formControlName="description"></textarea>
            </div>

            <!-- Status -->
            <div class="form-check form-switch mb-4">
              <input class="form-check-input"
                     type="checkbox"
                     formControlName="isActive">
              <label class="form-check-label">
                Active Status
              </label>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-3">

              <button type="button"
                      class="btn btn-primary flex-fill"
                      (click)="savePlan()"
                      [disabled]="submitting || planForm.invalid">

                <i class="fas"
                   [ngClass]="submitting ? 'fa-spinner fa-spin' : 'fa-save'"></i>

                {{ getButtonText() }}
              </button>

              <button *ngIf="isEditMode"
                      type="button"
                      class="btn btn-outline-secondary"
                      (click)="cancelEdit()">
                Cancel
              </button>

            </div>

          </form>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="col-lg-4">
      <div class="card shadow-sm border-0 h-100">

        <div class="card-header bg-success text-white">
          <h6 class="mb-0">
            All Plans ({{ plans.length }})
          </h6>
        </div>

        <div class="card-body p-0">

          <table class="table table-hover mb-0">

            <thead class="table-light">
              <tr>
                <th>Plan</th>
                <th>Price</th>
                <th>Students</th>
              </tr>
            </thead>

            <tbody>

              <tr *ngFor="let p of plans">

                <td>
                  <strong>{{ p.planName }}</strong><br>

                  <span class="badge"
                        [ngClass]="p.isActive ? 'bg-success' : 'bg-secondary'">

                    {{ p.isActive ? 'Active' : 'Inactive' }}

                  </span>
                </td>

                <td>₹{{ p.price }}</td>
                <td>{{ p.studentLimit }}</td>

              </tr>

              <tr *ngIf="plans.length === 0">
                <td colspan="3" class="text-center py-4 text-muted">
                  No plans found
                </td>
              </tr>

            </tbody>

          </table>

        </div>
      </div>
    </div>

  </div>
</div>
